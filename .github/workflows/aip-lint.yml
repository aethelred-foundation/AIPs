name: AIP Lint

on:
  pull_request:
    paths:
      - "AIPs/AIP-*.md"

permissions:
  contents: read

jobs:
  lint-frontmatter:
    name: Validate AIP frontmatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required frontmatter fields
        run: |
          set -euo pipefail

          REQUIRED_FIELDS="aip title author status type created"
          VALID_TYPES="Core Standard Informational Meta"
          VALID_STATUSES="Idea Draft Review Final Withdrawn Replaced"

          errors=0

          for file in $(git diff --name-only --diff-filter=ACM origin/main -- 'AIPs/AIP-*.md'); do
            # Skip the template file
            if [ "$file" = "AIPs/AIP-TEMPLATE.md" ]; then
              continue
            fi

            echo "--- Checking $file ---"

            # Extract frontmatter (between first two --- lines)
            frontmatter=$(sed -n '/^---$/,/^---$/p' "$file" | sed '1d;$d')

            if [ -z "$frontmatter" ]; then
              echo "ERROR: $file has no YAML frontmatter"
              errors=$((errors + 1))
              continue
            fi

            # Check each required field exists
            for field in $REQUIRED_FIELDS; do
              if ! echo "$frontmatter" | grep -qE "^${field}:"; then
                echo "ERROR: $file is missing required field: $field"
                errors=$((errors + 1))
              fi
            done

            # Validate title length (< 80 chars)
            title=$(echo "$frontmatter" | grep -E "^title:" | sed 's/^title:\s*//')
            if [ -n "$title" ] && [ ${#title} -gt 80 ]; then
              echo "ERROR: $file title exceeds 80 characters (${#title} chars)"
              errors=$((errors + 1))
            fi

            # Validate type field
            type_val=$(echo "$frontmatter" | grep -E "^type:" | sed 's/^type:\s*//')
            if [ -n "$type_val" ]; then
              valid=0
              for t in $VALID_TYPES; do
                if [ "$type_val" = "$t" ]; then
                  valid=1
                  break
                fi
              done
              if [ $valid -eq 0 ]; then
                echo "ERROR: $file has invalid type '$type_val' (must be one of: $VALID_TYPES)"
                errors=$((errors + 1))
              fi
            fi

            # Validate status field
            status_val=$(echo "$frontmatter" | grep -E "^status:" | sed 's/^status:\s*//')
            if [ -n "$status_val" ]; then
              valid=0
              for s in $VALID_STATUSES; do
                if [ "$status_val" = "$s" ]; then
                  valid=1
                  break
                fi
              done
              if [ $valid -eq 0 ]; then
                echo "ERROR: $file has invalid status '$status_val' (must be one of: $VALID_STATUSES)"
                errors=$((errors + 1))
              fi
            fi

            # Validate created date format (YYYY-MM-DD)
            created_val=$(echo "$frontmatter" | grep -E "^created:" | sed 's/^created:\s*//')
            if [ -n "$created_val" ] && ! echo "$created_val" | grep -qE "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"; then
              echo "ERROR: $file has invalid created date '$created_val' (must be YYYY-MM-DD)"
              errors=$((errors + 1))
            fi

            # Check required sections exist in the body
            REQUIRED_SECTIONS="Abstract Motivation Specification Rationale Backwards Compatibility Security Considerations Implementation Copyright"
            IFS='|'
            for section in Abstract Motivation Specification Rationale "Backwards Compatibility" "Security Considerations" Implementation Copyright; do
              if ! grep -qE "^## ${section}" "$file"; then
                echo "WARNING: $file is missing recommended section: ## $section"
              fi
            done
            unset IFS

            echo "$file: OK"
          done

          if [ $errors -gt 0 ]; then
            echo ""
            echo "FAILED: $errors error(s) found"
            exit 1
          fi

          echo ""
          echo "All AIP files passed validation."
